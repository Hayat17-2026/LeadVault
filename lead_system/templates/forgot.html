<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — LeadVault</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; background:#f5f3ff; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
    .wrap { width:100%; max-width:440px; padding:24px; }
    .logo-block { text-align:center; margin-bottom:28px; }
    .logo-icon { width:60px; height:60px; background:rgba(124,58,237,0.15); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; border:1px solid rgba(124,58,237,0.3); }
    .logo-icon i { font-size:28px; color:#a78bfa; }
    .logo-block h1 { color:#fff; font-size:20px; font-weight:700; }
    .card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:32px; }
    .step-indicator { display:flex; gap:6px; justify-content:center; margin-bottom:24px; }
    .step-dot { width:34px; height:4px; border-radius:2px; background:rgba(255,255,255,0.15); transition:.3s; }
    .step-dot.active { background:#7c3aed; }
    .form-label { color:rgba(255,255,255,0.7); font-size:13px; margin-bottom:6px; }
    .form-control { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; color:#fff; padding:11px 14px; font-size:14px; }
    .form-control:focus { background:rgba(255,255,255,0.12); border-color:#7c3aed; box-shadow:0 0 0 3px rgba(124,58,237,0.15); color:#fff; }
    .form-control::placeholder { color:rgba(255,255,255,0.25); }
    .btn-main { width:100%; padding:12px; background:#7c3aed; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; }
    .btn-main:hover { background:#6d28d9; }
    .btn-main:disabled { opacity:.6; cursor:not-allowed; }
    .msg { border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; display:none; }
    .msg.err { background:rgba(220,53,69,0.15); border:1px solid rgba(220,53,69,0.3); color:#ff8a8a; }
    .msg.ok { background:rgba(40,167,69,0.15); border:1px solid rgba(40,167,69,0.3); color:#86efac; }
    .back-link { text-align:center; margin-top:18px; }
    .back-link a { color:rgba(255,255,255,0.4); font-size:13px; text-decoration:none; }
    .back-link a:hover { color:#a78bfa; }
    .step-title { color:#fff; font-size:16px; font-weight:600; margin-bottom:6px; text-align:center; }
    .step-sub { color:rgba(255,255,255,0.4); font-size:13px; text-align:center; margin-bottom:20px; }
    .otp-input { text-align:center; font-size:24px; letter-spacing:8px; font-weight:700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-block">
      <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
      <h1>Reset Your Password</h1>
    </div>

    <div class="card">
      <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
        <div class="step-dot" id="dot4"></div>
      </div>

      <div class="msg" id="msg"></div>

      <!-- STEP 1: Username -->
      <div id="step1">
        <div class="step-title">Enter your username</div>
        <div class="step-sub">We'll find your account</div>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" id="username" placeholder="admin or hala"/>
        </div>
        <button class="btn-main" onclick="checkUser()">Continue <i class="bi bi-arrow-right ms-1"></i></button>
      </div>

      <!-- STEP 2: Security question -->
      <div id="step2" style="display:none;">
        <div class="step-title">Security Question</div>
        <div class="step-sub" id="questionText"></div>
        <div class="mb-3">
          <label class="form-label">Your Answer</label>
          <input class="form-control" id="securityAnswer" placeholder="Type your answer"/>
        </div>
        <button class="btn-main" onclick="verifySecurity()">Verify & Send Code <i class="bi bi-envelope ms-1"></i></button>
      </div>

      <!-- STEP 3: OTP code -->
      <div id="step3" style="display:none;">
        <div class="step-title">Enter Verification Code</div>
        <div class="step-sub" id="otpSub">Check your email for the 6-digit code</div>
        <div class="mb-3">
          <input class="form-control otp-input" id="otpCode" maxlength="6" placeholder="000000"/>
        </div>
        <button class="btn-main" onclick="verifyOtp()">Verify Code <i class="bi bi-check2 ms-1"></i></button>
      </div>

      <!-- STEP 4: New password -->
      <div id="step4" style="display:none;">
        <div class="step-title">Set New Password</div>
        <div class="step-sub">Choose a strong password</div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input class="form-control" id="newPassword" type="password" placeholder="At least 5 characters"/>
        </div>
        <button class="btn-main" onclick="doReset()">Reset Password <i class="bi bi-check-circle ms-1"></i></button>
      </div>
    </div>

    <div class="back-link"><a href="/login"><i class="bi bi-arrow-left me-1"></i>Back to Login</a></div>
  </div>

  <script>
    let currentUser = '';

    function showMsg(text, type) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'msg ' + type;
      m.style.display = 'block';
    }
    function hideMsg() { document.getElementById('msg').style.display = 'none'; }

    function goStep(n) {
      [1,2,3,4].forEach(i => {
        document.getElementById('step'+i).style.display = i===n ? 'block' : 'none';
        document.getElementById('dot'+i).classList.toggle('active', i<=n);
      });
      hideMsg();
    }

    async function checkUser() {
      const username = document.getElementById('username').value.trim().toLowerCase();
      if (!username) { showMsg('Enter your username', 'err'); return; }
      const r = await fetch('/forgot/check-user', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username })
      });
      const d = await r.json();
      if (d.status === 'ok') {
        currentUser = username;
        document.getElementById('questionText').textContent = d.question;
        goStep(2);
      } else { showMsg(d.message, 'err'); }
    }

    async function verifySecurity() {
      const answer = document.getElementById('securityAnswer').value.trim();
      if (!answer) { showMsg('Enter your answer', 'err'); return; }
      showMsg('Verifying…', 'ok');
      const r = await fetch('/forgot/verify-security', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: currentUser, answer })
      });
      const d = await r.json();
      if (d.status === 'ok') {
        document.getElementById('otpSub').textContent = d.message;
        goStep(3);
      } else { showMsg(d.message, 'err'); }
    }

    async function verifyOtp() {
      const code = document.getElementById('otpCode').value.trim();
      if (code.length !== 6) { showMsg('Enter the 6-digit code', 'err'); return; }
      const r = await fetch('/forgot/verify-otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: currentUser, code })
      });
      const d = await r.json();
      if (d.status === 'ok') { goStep(4); }
      else { showMsg(d.message, 'err'); }
    }

    async function doReset() {
      const password = document.getElementById('newPassword').value;
      const code     = document.getElementById('otpCode').value.trim();
      if (password.length < 5) { showMsg('Password must be at least 5 characters', 'err'); return; }
      const r = await fetch('/forgot/reset', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: currentUser, code, password })
      });
      const d = await r.json();
      if (d.status === 'ok') {
        showMsg(d.message + ' Redirecting…', 'ok');
        setTimeout(() => window.location.href = '/login', 2000);
      } else { showMsg(d.message, 'err'); }
    }
  </script>
</body>
</html>
