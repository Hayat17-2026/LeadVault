<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadVault — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh; display:flex; flex-direction:column;
      background:#f5f3ff; font-family:'Inter',sans-serif;
      overflow-x:hidden; position:relative;
    }

    /* ── Animated background orbs ── */
    .orb {
      position:fixed; border-radius:50%; filter:blur(110px);
      opacity:.55; pointer-events:none; z-index:0;
      animation:orbFloat 14s ease-in-out infinite;
    }
    .orb-a { width:700px; height:700px; top:-200px; left:-150px; background:radial-gradient(circle,rgba(124,58,237,.18),transparent 65%); animation-duration:16s; }
    .orb-b { width:500px; height:500px; bottom:-150px; right:-100px;  background:radial-gradient(circle,rgba(96,165,250,.14),transparent 65%); animation-duration:11s; animation-delay:-5s; }
    .orb-c { width:380px; height:380px; top:40%; left:50%; background:radial-gradient(circle,rgba(139,92,246,.12),transparent 65%); animation-duration:18s; animation-delay:-9s; }
    @keyframes orbFloat {
      0%,100%{transform:translate(0,0) scale(1);}
      33%{transform:translate(28px,-22px) scale(1.04);}
      66%{transform:translate(-18px,30px) scale(.97);}
    }

    /* Grid overlay */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(167,139,250,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,.04) 1px, transparent 1px);
      background-size:54px 54px;
    }

    /* ── Top bar ── */
    .lv-topbar {
      position:relative; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:24px 40px 10px;
    }
    .lv-brand { display:flex; align-items:center; gap:14px; }
    .lv-brand-icon {
      width:48px; height:48px; border-radius:14px;
      background:linear-gradient(135deg,#7c3aed,#3b82f6);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 6px 24px rgba(124,58,237,.45); flex-shrink:0;
    }
    .lv-brand-icon i { color:#fff; font-size:24px; }
    .lv-brand-text h2 {
      font-family:'Sora',sans-serif; font-size:20px;
      font-weight:800; color:#fff; margin:0;
    }
    .lv-brand-text .tagline {
      font-size:10px; font-weight:700; letter-spacing:2px;
      background:linear-gradient(90deg,#a78bfa,#60a5fa);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }

    /* Logo zone — replace content with <img> when ready */
    .logo-zone {
      width:130px; height:54px;
      border:1.5px dashed rgba(167,139,250,.28);
      border-radius:12px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:3px; color:rgba(167,139,250,.35);
      cursor:default; transition:all .2s;
      background:rgba(124,58,237,.04);
    }
    .logo-zone i    { font-size:18px; }
    .logo-zone small { font-size:9px; letter-spacing:1px; text-transform:uppercase; font-weight:600; }

    /* ── Login center wrapper ── */
    .login-center {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:16px 20px 44px;
      position:relative; z-index:10;
    }

    /* ── Login card ── */
    .login-card {
      width:100%; max-width:440px;
      background:#ffffff;
      border:1px solid rgba(124,58,237,.14);
      border-radius:20px; padding:40px 44px;
      box-shadow:0 16px 56px rgba(124,58,237,.14), 0 0 0 1px rgba(124,58,237,.06);
      animation:cardIn .5s cubic-bezier(.22,1,.36,1);
    }
    @keyframes cardIn {
      from{opacity:0;transform:translateY(26px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* Card heading */
    .card-heading { text-align:center; margin-bottom:8px; }
    .card-heading h3 {
      font-family:'Sora',sans-serif; font-size:22px; font-weight:800;
      color:#111827; margin-bottom:6px;
    }
    .card-heading p { font-size:13px; color:#6b7280; }
    .card-divider {
      width:44px; height:3px; border-radius:2px;
      background:linear-gradient(90deg,#7c3aed,#3b82f6);
      margin:12px auto 24px;
    }

    /* Form groups */
    .fg { margin-bottom:14px; }
    .fg label {
      display:block; font-size:11px; font-weight:600; color:#7c3aed;
      margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px;
    }
    .iw { position:relative; }
    .iw .fi {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      color:rgba(124,58,237,.45); font-size:14px; pointer-events:none;
    }
    .fc {
      width:100%; padding:11px 12px 11px 38px;
      background:#f5f3ff;
      border:1.5px solid rgba(124,58,237,.2);
      border-radius:10px; font-size:14px; color:#111827;
      font-family:'Inter',sans-serif; transition:all .18s; outline:none;
    }
    .fc:focus {
      border-color:#7c3aed; background:#ffffff;
      box-shadow:0 0 0 3px rgba(124,58,237,.1);
    }
    .fc::placeholder { color:#9ca3af; }
    .fc option { background:#ffffff; color:#111827; }
    .eye-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      color:rgba(124,58,237,.4); cursor:pointer; font-size:14px;
    }

    /* Primary button */
    .btn-go {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#7c3aed,#3b82f6); color:#fff;
      border:none; border-radius:10px; font-size:15px; font-weight:600;
      cursor:pointer; font-family:'Inter',sans-serif;
      box-shadow:0 4px 18px rgba(124,58,237,.45);
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:all .2s; margin-top:8px;
      position:relative; overflow:hidden;
    }
    .btn-go::after {
      content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
      transition:left .4s;
    }
    .btn-go:hover { transform:translateY(-1px); box-shadow:0 7px 26px rgba(124,58,237,.6); }
    .btn-go:hover::after { left:100%; }
    .btn-go:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    .btn-back {
      width:100%; padding:11px;
      background:rgba(124,58,237,.06); color:#7c3aed;
      border:1.5px solid rgba(124,58,237,.18); border-radius:10px;
      font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; margin-top:8px;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .15s;
    }
    .btn-back:hover { border-color:rgba(124,58,237,.5); color:#a78bfa; }

    /* Error box */
    .err-box {
      background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#f87171;
      border-radius:8px; padding:10px 12px; font-size:13px;
      margin-bottom:12px; display:none; align-items:center; gap:8px;
    }

    .fp-link { text-align:center; margin-top:16px; font-size:12px; }
    .fp-link a { color:#9ca3af; text-decoration:none; }
    .fp-link a:hover { color:#7c3aed; }

    /* CAPTCHA step */
    #captchaStep { display:none; }
    .cap-shield {
      width:66px; height:66px; border-radius:50%;
      background:rgba(124,58,237,.15); border:2px solid rgba(124,58,237,.3);
      display:flex; align-items:center; justify-content:center; margin:0 auto 12px;
    }
    .cap-shield i { font-size:28px; color:#a78bfa; }
    .cap-header { text-align:center; margin-bottom:20px; }
    .cap-header h3 {
      font-family:'Sora',sans-serif; font-size:17px; font-weight:700; color:#111827; margin-bottom:4px;
    }
    .cap-header p { font-size:12px; color:#6b7280; }
    .cap-box {
      background:#f5f3ff; border:1.5px solid rgba(124,58,237,.18);
      border-radius:12px; padding:16px; margin-bottom:14px;
    }
    .cap-lbl {
      display:block; font-size:11px; font-weight:600; color:#a78bfa;
      text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px;
    }
    .cap-canvas-row { display:flex; justify-content:center; margin-bottom:10px; }
    .cap-input-row  { display:flex; align-items:center; gap:8px; }
    .cap-input {
      flex:1; padding:10px; border:1.5px solid rgba(124,58,237,.2);
      border-radius:8px; font-size:18px; font-weight:700; text-align:center;
      letter-spacing:8px; text-transform:uppercase;
      background:#ffffff; color:#111827;
      font-family:'Courier New',monospace; outline:none;
    }
    .cap-input:focus { border-color:#7c3aed; box-shadow:0 0 0 3px rgba(124,58,237,.2); }
    .cap-refresh {
      width:38px; height:38px; flex-shrink:0;
      border:1.5px solid rgba(124,58,237,.2); border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:rgba(124,58,237,.5); font-size:15px; transition:all .15s;
    }
    .cap-refresh:hover { border-color:#7c3aed; color:#a78bfa; }

    /* Footer note */
    .card-footer-note {
      text-align:center; margin-top:24px; padding-top:16px;
      border-top:1px solid rgba(124,58,237,.1);
      font-size:10px; color:#9ca3af;
    }

    @media (max-width:500px) {
      .lv-topbar { padding:18px 20px 8px; }
      .login-card { padding:32px 24px; }
    }
  </style>
</head>
<body>

  <!-- Background effects -->
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <!-- ══ TOP BAR ══ -->
  <div class="lv-topbar">
    <!-- Left: brand title -->
    <div class="lv-brand">
      <div class="lv-brand-icon"><i class="bi bi-safe2-fill"></i></div>
      <div class="lv-brand-text">
        <h2 style="color:#111827;">LeadVault</h2>
        <span class="tagline">AI LEAD INTELLIGENCE</span>
      </div>
    </div>

    <!-- Right: logo placeholder — replace inner content with <img src="logo.png"> -->
    <div class="logo-zone">
      <i class="bi bi-image"></i>
      <small>Your Logo</small>
    </div>
  </div>

  <!-- ══ CENTERED FORM ══ -->
  <div class="login-center">
    <div class="login-card">

      <div class="card-heading">
        <h3>Welcome Back</h3>
        <p>Sign in to access your lead dashboard</p>
      </div>
      <div class="card-divider"></div>

      <!-- ── STEP 1: CREDENTIALS ── -->
      <div id="formStep">
        <div class="err-box" id="errorMsg">
          <i class="bi bi-exclamation-circle"></i>
          <span id="errorText"></span>
        </div>

        <div class="fg">
          <label>Account Type</label>
          <div class="iw">
            <i class="bi bi-person-badge fi"></i>
            <select class="fc" id="role">
              <option value="admin">Administrator</option>
              <option value="staff">Staff Member</option>
            </select>
          </div>
        </div>

        <div class="fg">
          <label>Username or Email</label>
          <div class="iw">
            <i class="bi bi-person fi"></i>
            <input type="text" class="fc" id="username"
              placeholder="Enter your username or email" autocomplete="username"/>
          </div>
        </div>

        <div class="fg">
          <label>Password</label>
          <div class="iw">
            <i class="bi bi-lock fi"></i>
            <input type="password" class="fc" id="password"
              placeholder="Enter your password" autocomplete="current-password"/>
            <i class="bi bi-eye eye-toggle" id="eyeIcon" onclick="togglePass()"></i>
          </div>
        </div>

        <button class="btn-go" id="proceedBtn" onclick="proceedToCaptcha()">
          <i class="bi bi-arrow-right-circle"></i> Sign In
        </button>

        <div class="fp-link">
          <a href="/forgot"><i class="bi bi-question-circle me-1"></i>Forgot password?</a>
        </div>
      </div>

      <!-- ── STEP 2: CAPTCHA ── -->
      <div id="captchaStep">
        <div class="cap-header">
          <div class="cap-shield"><i class="bi bi-shield-check"></i></div>
          <h3>Verify You're Human</h3>
          <p>Complete the check to sign in</p>
        </div>

        <div class="err-box" id="captchaErrorMsg">
          <i class="bi bi-exclamation-circle"></i>
          <span id="captchaErrorText"></span>
        </div>

        <div class="cap-box">
          <span class="cap-lbl"><i class="bi bi-fonts me-1"></i>Type the letters shown</span>
          <div class="cap-canvas-row">
            <canvas id="captchaCanvas" width="220" height="58"
              style="border-radius:8px; border:1px solid rgba(124,58,237,.3);"></canvas>
          </div>
          <div class="cap-input-row">
            <input class="cap-input" id="captchaAnswer"
              placeholder="· · · · ·" maxlength="5" autocomplete="off"/>
            <div class="cap-refresh" onclick="loadCaptcha()">
              <i class="bi bi-arrow-clockwise"></i>
            </div>
          </div>
        </div>

        <button class="btn-go" id="loginBtn" onclick="doLogin()">
          <i class="bi bi-box-arrow-in-right"></i> Confirm &amp; Sign In
        </button>
        <button class="btn-back" onclick="backToForm()">
          <i class="bi bi-arrow-left"></i> Back
        </button>
      </div>

      <div class="card-footer-note">
        LeadVault &copy; 2025 &nbsp;·&nbsp; Islamic University of Lebanon &nbsp;·&nbsp; CCE FYP
      </div>

    </div>
  </div>

<script>
  let captchaToken = '';

  function drawCaptcha(letters) {
    const canvas = document.getElementById('captchaCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#f5f3ff';
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = `rgba(167,139,250,${.10 + Math.random()*.10})`;
      ctx.lineWidth = 1; ctx.beginPath();
      ctx.moveTo(Math.random()*W, Math.random()*H);
      ctx.lineTo(Math.random()*W, Math.random()*H);
      ctx.stroke();
    }
    for (let i = 0; i < 18; i++) {
      ctx.fillStyle = `rgba(167,139,250,${.08 + Math.random()*.14})`;
      ctx.beginPath();
      ctx.arc(Math.random()*W, Math.random()*H, Math.random()*1.6, 0, Math.PI*2);
      ctx.fill();
    }
    const cw = W / letters.length;
    letters.split('').forEach((ch, i) => {
      ctx.save();
      ctx.translate(cw*i + cw/2, H/2);
      ctx.rotate((Math.random()-.5)*.22);
      ctx.font = `bold 24px 'Courier New', monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#5b21b6';
      ctx.fillText(ch, 0, (Math.random()-.5)*6);
      ctx.restore();
    });
  }

  async function loadCaptcha() {
    const r = await fetch('/letter-captcha');
    const d = await r.json();
    captchaToken = d.token;
    drawCaptcha(d.letters);
    document.getElementById('captchaAnswer').value = '';
  }

  async function proceedToCaptcha() {
    hideErr('errorMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      showErr('errorMsg','errorText','Please enter your username/email and password.');
      return;
    }
    const btn = document.getElementById('proceedBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Checking…';
    try {
      const resp = await fetch('/login/check', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ username, password, role:document.getElementById('role').value })
      });
      const data = await resp.json();
      if (data.status === 'ok') {
        document.getElementById('formStep').style.display    = 'none';
        document.getElementById('captchaStep').style.display = 'block';
        loadCaptcha();
      } else {
        showErr('errorMsg','errorText', data.message || 'Invalid credentials.');
      }
    } catch(e) {
      showErr('errorMsg','errorText','Connection error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-right-circle"></i> Sign In';
    }
  }

  function backToForm() {
    document.getElementById('captchaStep').style.display = 'none';
    document.getElementById('formStep').style.display    = 'block';
    hideErr('captchaErrorMsg');
  }

  function showErr(b,s,m){ document.getElementById(s).textContent=m; document.getElementById(b).style.display='flex'; }
  function hideErr(b){ document.getElementById(b).style.display='none'; }

  function togglePass() {
    const inp = document.getElementById('password');
    const ico = document.getElementById('eyeIcon');
    inp.type = inp.type==='password' ? 'text' : 'password';
    ico.className = inp.type==='text' ? 'bi bi-eye-slash eye-toggle' : 'bi bi-eye eye-toggle';
  }

  document.addEventListener('keydown', e => {
    if (e.key!=='Enter') return;
    document.getElementById('captchaStep').style.display==='block' ? doLogin() : proceedToCaptcha();
  });

  async function doLogin() {
    hideErr('captchaErrorMsg');
    const ans = document.getElementById('captchaAnswer').value.trim();
    if (!ans) { showErr('captchaErrorMsg','captchaErrorText','Please type the letters shown.'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Signing in…';
    const payload = {
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value,
      role:     document.getElementById('role').value,
      captcha_token:  captchaToken,
      captcha_answer: ans
    };
    async function attempt(retry) {
      try {
        const resp = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const data = await resp.json();
        if (data.status==='ok') {
          btn.innerHTML = '<i class="bi bi-check-circle"></i> Success!';
          window.location.href = data.redirect;
        } else {
          showErr('captchaErrorMsg','captchaErrorText', data.message||'Login failed.');
          loadCaptcha();
          btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right"></i> Confirm &amp; Sign In';
        }
      } catch(e) {
        if (retry>0) { setTimeout(()=>attempt(retry-1),1200); }
        else {
          showErr('captchaErrorMsg','captchaErrorText','Connection error. Please try again.');
          loadCaptcha();
          btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right"></i> Confirm &amp; Sign In';
        }
      }
    }
    await attempt(2);
  }
</script>
</body>
</html>
